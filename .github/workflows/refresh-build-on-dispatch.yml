  build-android-arm64:
    name: "\u6784\u5EFA Android ARM64 \u53EF\u6267\u884C\u6587\u4EF6"
    needs: fetch_and_clean
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.fetch_and_clean.outputs.tag }}
