    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust (musl target)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-unknown-linux-musl
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}-musl-arm64
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary (musl arm64)
      run: cargo build --release --target aarch64-unknown-linux-musl --no-default-features
        --features official-api,tts-native,clipboard
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        out="TomatoNovelDownloader-Linux_musl_arm64-${BUILD_TAG}"

        cp target/aarch64-unknown-linux-musl/release/tomato-novel-downloader "dist/${out}"

