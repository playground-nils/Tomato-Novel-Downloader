name: Refresh Build
'on':
  workflow_dispatch: null
  repository_dispatch:
    types:
    - build_trigger
permissions:
  contents: write
jobs:
  fetch_and_clean:
    name: "\u83B7\u53D6\u6700\u65B0 Tag"
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get_latest_tag.outputs.Tag }}
    steps:
    - name: "Checkout \u4ED3\u5E93\uFF08\u5B8C\u6574\u62C9\u53D6\uFF09"
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: "\u83B7\u53D6\u6700\u65B0 Tag"
      id: get_latest_tag
      run: "LATEST_TAG=$(git for-each-ref --sort=-creatordate --format='%(refname:short)'\
        \ refs/tags | head -n 1)\necho \"Tag=$LATEST_TAG\" >> \"$GITHUB_OUTPUT\"\n\
        echo \"\u83B7\u53D6\u5230\u6700\u65B0 Tag: $LATEST_TAG\"\n"
  build-linux:
    name: "\u6784\u5EFA Linux AMD64 \u53EF\u6267\u884C\u6587\u4EF6"
    needs: fetch_and_clean
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.fetch_and_clean.outputs.tag }}
    steps:
    - name: "Checkout \u4EE3\u7801 (\u6309\u6700\u65B0 Tag)"
      uses: actions/checkout@v4
      with:
        ref: ${{ env.BUILD_TAG }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary
      run: cargo build --release
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        out="TomatoNovelDownloader-Linux_amd64-${BUILD_TAG}"

        cp target/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: dist
  build-linux-musl:
    name: "\u6784\u5EFA Linux musl AMD64 \u53EF\u6267\u884C\u6587\u4EF6"
    needs: fetch_and_clean
    runs-on: ubuntu-latest
    env:
      BUILD_TAG: ${{ needs.fetch_and_clean.outputs.tag }}
    steps:
    - name: "Checkout \u4EE3\u7801 (\u6309\u6700\u65B0 Tag)"
      uses: actions/checkout@v4
      with:
        ref: ${{ env.BUILD_TAG }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust (musl target)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-musl
    - name: Install musl tools
      shell: bash
      run: 'set -euo pipefail

        sudo apt-get update

        sudo apt-get install -y musl-tools

        '
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}-musl
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary (musl)
      run: cargo build --release --target x86_64-unknown-linux-musl --no-default-features
        --features official-api,tts-native,clipboard
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        out="TomatoNovelDownloader-Linux_musl_amd64-${BUILD_TAG}"

        cp target/x86_64-unknown-linux-musl/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload Linux musl Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-musl-build
        path: dist
  build-linux-musl-arm64:
    name: "\u6784\u5EFA Linux musl ARM64 \u53EF\u6267\u884C\u6587\u4EF6"
