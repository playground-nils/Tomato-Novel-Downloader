name: "PR \u6807\u7B7E\u89E6\u53D1\u591A\u5E73\u53F0\u6784\u5EFA"
'on':
  pull_request_target:
    types:
    - labeled
jobs:
  cancel_if_unrelated:
    runs-on: ubuntu-latest
    if: github.event.label.name != 'run-build' && github.event.label.name != 'Run-Build'
      && github.event.label.name != 'RUN-BUILD'
    steps:
    - name: "\u975E\u76EE\u6807\u6807\u7B7E\uFF0C\u53D6\u6D88\u672C\u6B21 Workflow"
      uses: styfle/cancel-workflow-action@0.9.1
      with:
        access_token: ${{ secrets.GITHUB_TOKEN }}
  build-linux:
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout PR \u6E90\u5206\u652F\u4EE3\u7801"
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary
      run: cargo build --release
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        VERSION="sha-${{ github.event.pull_request.head.sha }}"

        out="TomatoNovelDownloader-Linux_amd64-${VERSION}"

        cp target/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload Linux Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: dist/TomatoNovelDownloader-*
  build-linux-arm64:
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout PR \u6E90\u5206\u652F\u4EE3\u7801"
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary
      run: cargo build --release
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        VERSION="sha-${{ github.event.pull_request.head.sha }}"

        out="TomatoNovelDownloader-Linux_arm64-${VERSION}"

        cp target/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload Linux ARM64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-arm64-build
        path: dist/TomatoNovelDownloader-*
  build-linux-musl:
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout PR \u6E90\u5206\u652F\u4EE3\u7801"
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust (musl target)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: x86_64-unknown-linux-musl
    - name: Install musl tools
      shell: bash
      run: 'set -euo pipefail

        sudo apt-get update

        sudo apt-get install -y musl-tools

        '
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}-musl
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary (musl)
      run: cargo build --release --target x86_64-unknown-linux-musl --no-default-features
        --features official-api,tts-native,clipboard
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        VERSION="sha-${{ github.event.pull_request.head.sha }}"

        out="TomatoNovelDownloader-Linux_musl_amd64-${VERSION}"

        cp target/x86_64-unknown-linux-musl/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload Linux musl Artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-musl-build
        path: dist/TomatoNovelDownloader-*
  build-android-arm64:
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: ubuntu-latest
    steps:
    - name: "Checkout PR \u6E90\u5206\u652F\u4EE3\u7801"
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust (android target)
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-linux-android
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    - name: Install Android NDK
      shell: bash
      run: 'set -euo pipefail

        set +o pipefail

        yes | sdkmanager --licenses >/dev/null

        set -o pipefail

        sdkmanager "ndk;26.1.10909125"

        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> "$GITHUB_ENV"

        '
    - name: Configure Android linker
      shell: bash
      run: 'set -euo pipefail

        TOOLCHAIN="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin"

        echo "$TOOLCHAIN" >> "$GITHUB_PATH"

        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$TOOLCHAIN/aarch64-linux-android21-clang"
        >> "$GITHUB_ENV"

        echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_AR=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"

        echo "CC_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang" >>
        "$GITHUB_ENV"

        echo "CXX_aarch64_linux_android=$TOOLCHAIN/aarch64-linux-android21-clang++"
        >> "$GITHUB_ENV"

        echo "AR_aarch64_linux_android=$TOOLCHAIN/llvm-ar" >> "$GITHUB_ENV"

        '
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}-android-arm64
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary (android arm64)
      run: cargo build --release --target aarch64-linux-android --no-default-features
        --features official-api,tts-native,clipboard
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        VERSION="sha-${{ github.event.pull_request.head.sha }}"

        out="TomatoNovelDownloader-Android_arm64-${VERSION}"

        cp target/aarch64-linux-android/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload Android arm64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-build
        path: dist/TomatoNovelDownloader-*
  build-windows:
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: windows-latest
    steps:
    - name: "Checkout PR \u6E90\u5206\u652F\u4EE3\u7801"
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: powershell
      run: '$link = Join-Path $env:GITHUB_WORKSPACE ''..\Tomato-Novel-Official-API''

        if (Test-Path $link) { Remove-Item -Recurse -Force $link }

        New-Item -ItemType Junction -Path $link -Target (Join-Path $env:GITHUB_WORKSPACE
        ''Tomato-Novel-Official-API'') | Out-Null

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary
      run: cargo build --release
    - name: Bundle artifacts
      shell: powershell
      run: 'New-Item -ItemType Directory -Force -Path dist | Out-Null

        $version = "sha-${{ github.event.pull_request.head.sha }}"

        $out = "TomatoNovelDownloader-Win64-$version.exe"

        Copy-Item -Path target\release\tomato-novel-downloader.exe -Destination (Join-Path
        dist $out) -Force

        '
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: dist\TomatoNovelDownloader-*.exe
  build-macos:
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: macos-latest
    steps:
    - name: "Checkout PR \u6E90\u5206\u652F\u4EE3\u7801"
      uses: actions/checkout@v4
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.ref }}
        token: ${{ secrets.GITHUB_TOKEN }}
    - name: Checkout Tomato-Novel-Official-API (private)
      uses: actions/checkout@v4
      with:
        repository: zhongbai2333/Tomato-Novel-Official-API
        token: ${{ secrets.OAPI }}
        path: Tomato-Novel-Official-API
    - name: Link Official-API for path dependency
      shell: bash
      run: 'set -euo pipefail

        rm -rf "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API" || true

        ln -s "$GITHUB_WORKSPACE/Tomato-Novel-Official-API" "$GITHUB_WORKSPACE/../Tomato-Novel-Official-API"

        '
    - name: Compute Cargo.lock hash
      id: cargo-lock-hash
      shell: bash
      run: "set -euo pipefail\nif [ ! -f Cargo.lock ]; then\n  echo \"hash=missing\"\
        \ >> \"$GITHUB_OUTPUT\"\n  exit 0\nfi\nif command -v python3 >/dev/null 2>&1;\
        \ then\n  PYTHON=python3\nelse\n  PYTHON=python\nfi\nHASH=$($PYTHON -c \"\
        import hashlib, pathlib; print(hashlib.sha256(pathlib.Path('Cargo.lock').read_bytes()).hexdigest())\"\
        )\necho \"hash=$HASH\" >> \"$GITHUB_OUTPUT\"\n"
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Cache cargo artifacts
      uses: actions/cache@v4
      with:
        path: '~/.cargo/registry

          ~/.cargo/git

          target

          Tomato-Novel-Official-API/target

          '
        key: ${{ runner.os }}-cargo-${{ steps.cargo-lock-hash.outputs.hash }}
        restore-keys: '${{ runner.os }}-cargo-

          '
    - name: Build release binary
      run: cargo build --release
    - name: Bundle artifacts
      shell: bash
      run: 'set -euo pipefail

        mkdir -p dist

        VERSION="sha-${{ github.event.pull_request.head.sha }}"

        out="TomatoNovelDownloader-macOS_arm64-${VERSION}"

        cp target/release/tomato-novel-downloader "dist/${out}"

        '
    - name: Upload macOS arm64 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: macos-build
        path: dist/TomatoNovelDownloader-macOS_arm64-*
  build-on-label:
    needs:
    - build-linux
    - build-linux-musl
    - build-linux-arm64
    - build-android-arm64
    - build-windows
    - build-macos
    if: github.event.label.name == 'run-build' || github.event.label.name == 'Run-Build'
      || github.event.label.name == 'RUN-BUILD'
    runs-on: ubuntu-latest
    steps:
    - name: "\u8BC4\u8BBA & \u5220\u9664\u6807\u7B7E"
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: "await github.rest.issues.createComment({\n  issue_number: context.issue.number,\n\
          \  owner: context.repo.owner,\n  repo: context.repo.repo,\n  body: '\u2705\
          \ Rust \u591A\u5E73\u53F0\u6784\u5EFA\u5B8C\u6210\uFF0C\u5DF2\u751F\u6210\
          \u53EF\u6267\u884C\u6587\u4EF6\u3002'\n});\nawait github.rest.issues.removeLabel({\n\
          \  issue_number: context.issue.number,\n  owner: context.repo.owner,\n \
          \ repo: context.repo.repo,\n  name: context.payload.label.name\n});"
